<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlipAI</title>
</head>
<body>

  <h1>FlipAI</h1>

  <button onclick="runTest()">Run Test</button>

  <pre id="output"></pre>

  <script>
    async function runTest() {
      const res = awaitfetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: "iphone 12 cracked screen" })
      });

      const data = await res.json();
      document.getElementById('output').innerText = JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
