<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipAI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      color: #6b7280;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: #111827;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.96;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .secondary-btn {
      background: #374151;
    }

    .upgrade-btn {
      background: #2563eb;
      margin-top: 12px;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .loading {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .error {
      background: #fef2f2;
      color: #991b1b;
    }

    .success {
      background: #ecfdf5;
      color: #065f46;
    }

    .placeholder {
      color: #6b7280;
      font-size: 14px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      background: #f9fafb;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
    }

    .metric .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .panel {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      line-height: 1.5;
    }

    .reasoning {
      padding: 14px;
      border-radius: 12px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
      margin-top: 10px;
    }

    .user-email {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .locked-box {
      padding: 16px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
    }

    @media (max-width: 850px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>FlipAI</h1>
      <p>Analyze product flips before you buy.</p>
    </div>

    <div class="card" style="margin-bottom: 20px;">
      <h2>Account</h2>

      <div id="authArea">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Your name" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="At least 8 characters" />
        </div>

        <button id="loginBtn">Login</button>
        <button id="signupBtn" class="secondary-btn" style="margin-top: 8px;">Sign Up</button>
      </div>

      <div id="userArea" style="display: none;">
        <div id="userEmail" class="user-email"></div>
        <button id="billingBtn" class="secondary-btn" style="margin-bottom: 8px;">Manage Billing</button>
        <button id="logoutBtn">Logout</button>
      </div>

      <div id="authStatus"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Flip Details</h2>

        <div class="field">
          <label for="product">Product</label>
          <input
            id="product"
            type="text"
            placeholder="e.g. iPhone 12 64GB Unlocked"
            value="iPhone 12 64GB Unlocked"
          />
        </div>

        <div class="field">
          <label for="condition">Condition</label>
          <textarea
            id="condition"
            placeholder="Describe faults, wear, battery, functionality"
          >Cracked screen, fully working, battery fine, light wear</textarea>
        </div>

        <div class="field">
          <label for="buyPrice">Buy Price (£)</label>
          <input
            id="buyPrice"
            type="number"
            step="0.01"
            placeholder="90"
            value="90"
          />
        </div>

        <div class="field">
          <label for="repairCost">Repair Cost (£)</label>
          <input
            id="repairCost"
            type="number"
            step="0.01"
            placeholder="40"
            value="40"
          />
        </div>

        <div class="field">
          <label for="extras">Extras</label>
          <input
            id="extras"
            type="text"
            placeholder="e.g. Box included, unlocked"
            value="Box included, unlocked"
          />
        </div>

        <div class="field">
          <label for="goal">Goal</label>
          <select id="goal">
            <option selected>Fast sale</option>
            <option>Maximum profit</option>
            <option>Low risk</option>
          </select>
        </div>

        <button id="analyzeBtn">Analyze Flip</button>
        <div id="status"></div>
      </div>

      <div class="card">
        <h2>Result</h2>
        <div id="resultArea" class="placeholder">
          Submit a flip and your analysis will appear here.
        </div>
      </div>
    </div>
  </div>

  <script>
    const analyzeBtn = document.getElementById("analyzeBtn");
    const statusEl = document.getElementById("status");
    const resultArea = document.getElementById("resultArea");

    const authArea = document.getElementById("authArea");
    const userArea = document.getElementById("userArea");
    const userEmailEl = document.getElementById("userEmail");
    const authStatusEl = document.getElementById("authStatus");

    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const billingBtn = document.getElementById("billingBtn");

    function getPayload() {
      return {
        product: document.getElementById("product").value.trim(),
        condition: document.getElementById("condition").value.trim(),
        buyPrice: Number(document.getElementById("buyPrice").value || 0),
        repairCost: Number(document.getElementById("repairCost").value || 0),
        extras: document.getElementById("extras").value.trim(),
        goal: document.getElementById("goal").value
      };
    }

    function getCredentials() {
      return {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };
    }

    function currency(value) {
      return "£" + Number(value || 0).toFixed(2);
    }

    function verdictColor(text) {
      const value = String(text || "").toUpperCase();

      if (value.includes("OK")) return "#16a34a";
      if (value.includes("MARGINAL")) return "#f59e0b";
      if (value.includes("GOOD")) return "#16a34a";
      if (value.includes("BAD")) return "#dc2626";
      if (value.includes("SKIP")) return "#dc2626";

      return "#374151";
    }

    function setAuthStatus(message, type) {
      if (!message) {
        authStatusEl.innerHTML = "";
        return;
      }

      authStatusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    function setAnalyzeStatus(message, type) {
      if (!message) {
        statusEl.innerHTML = "";
        return;
      }

      statusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    function renderLockedState(message, showUpgrade) {
      resultArea.innerHTML = `
        <div class="locked-box">
          <strong>${message}</strong>
          ${
            showUpgrade
              ? `<button id="upgradeBtn" class="upgrade-btn">Upgrade to Continue</button>`
              : ""
          }
        </div>
      `;

      if (showUpgrade) {
        const upgradeBtn = document.getElementById("upgradeBtn");
        upgradeBtn.addEventListener("click", startCheckout);
      }
    }

    function renderResult(data) {
      const result = data.result || {};
      const metrics = result.flipMetrics || {};
      const analysis = result.flip_analysis || {};
      const listing = result.ebay_listing || {};

      resultArea.innerHTML = `
        <div class="results-grid">
          <div class="metric">
            <div class="label">Profit</div>
            <div class="value">${currency(metrics.profit)}</div>
          </div>

          <div class="metric">
            <div class="label">Total Cost</div>
            <div class="value">${currency(metrics.totalCost)}</div>
          </div>

          <div class="metric">
            <div class="label">Resale Value</div>
            <div class="value">${currency(metrics.estimatedResale)}</div>
          </div>

          <div class="metric">
            <div class="label">eBay Fees</div>
            <div class="value">${currency(metrics.ebayFees)}</div>
          </div>
        </div>

        <div class="panel" style="font-weight: 700; color: ${verdictColor(metrics.verdict || analysis.final_verdict)};">
          Verdict: ${metrics.verdict || analysis.final_verdict || "Unknown"}
        </div>

        <div class="panel">
          <strong>Risk:</strong> ${analysis.risk_level || "N/A"}<br>
          <strong>Time to sell:</strong> ${analysis.time_to_sell_estimate || "N/A"}<br>
          <strong>Buy price:</strong> ${currency(analysis.buy_price)}<br>
          <strong>Sale price:</strong> ${currency(analysis.sale_price)}
        </div>

        <div class="reasoning">${analysis.brief_reasoning || "No analysis provided."}</div>

        ${
          listing.title
            ? `
              <div class="panel" style="margin-top: 12px;">
                <strong>Suggested eBay title:</strong><br>
                ${listing.title}
              </div>
            `
            : ""
        }
      `;
    }

    async function runAnalysis() {
      setAnalyzeStatus("Analyzing...", "loading");
      resultArea.innerHTML = "";
      analyzeBtn.disabled = true;

      try {
        const payload = getPayload();

        const res = await fetch("/api/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.status === 401) {
          setAnalyzeStatus("Please sign in to use FlipAI analysis.", "error");
          renderLockedState("Please sign in to use FlipAI analysis.", false);
          return;
        }

        if (res.status === 403 || data.locked === true) {
          setAnalyzeStatus(data.error || "Free limit reached. Upgrade to continue.", "error");
          renderLockedState(data.error || "Free limit reached. Upgrade to continue.", true);
          return;
        }

        if (!res.ok) {
          throw new Error(data.error || "Request failed");
        }

        setAnalyzeStatus("Analysis complete.", "success");
        renderResult(data);
      } catch (err) {
        setAnalyzeStatus(`Error: ${err.message}`, "error");
        resultArea.innerHTML = '<div class="placeholder">No result available.</div>';
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    async function loadUser() {
      try {
        const res = await fetch("/api/me", {
          credentials: "include"
        });

        if (!res.ok) {
          authArea.style.display = "block";
          userArea.style.display = "none";
          userEmailEl.textContent = "";
          return;
        }

        const data = await res.json();

        if (data.user) {
          authArea.style.display = "none";
          userArea.style.display = "block";
          userEmailEl.textContent = `Logged in as: ${data.user.email}`;
        } else {
          authArea.style.display = "block";
          userArea.style.display = "none";
          userEmailEl.textContent = "";
        }
      } catch {
        authArea.style.display = "block";
        userArea.style.display = "none";
        userEmailEl.textContent = "";
      }
    }

    async function login() {
      const { email, password } = getCredentials();

      if (!email || !password) {
        setAuthStatus("Enter your email and password.", "error");
        return;
      }

      loginBtn.disabled = true;
      signupBtn.disabled = true;
      setAuthStatus("Logging in...", "loading");

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Login failed");
        }

        setAuthStatus("Login successful.", "success");
        await loadUser();
      } catch (err) {
        setAuthStatus(`Error: ${err.message}`, "error");
      } finally {
        loginBtn.disabled = false;
        signupBtn.disabled = false;
      }
    }

    async function signup() {
      const { name, email, password } = getCredentials();

      if (!name || !email || !password) {
        setAuthStatus("Enter your name, email, and password.", "error");
        return;
      }

      if (password.length < 8) {
        setAuthStatus("Password must be at least 8 characters.", "error");
        return;
      }

      loginBtn.disabled = true;
      signupBtn.disabled = true;
      setAuthStatus("Creating account...", "loading");

      try {
        const res = await fetch("/api/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Signup failed");
        }

        setAuthStatus("Account created.", "success");
        await loadUser();
      } catch (err) {
        setAuthStatus(`Error: ${err.message}`, "error");
      } finally {
        loginBtn.disabled = false;
        signupBtn.disabled = false;
      }
    }

    async function logout() {
      logoutBtn.disabled = true;
      setAuthStatus("Logging out...", "loading");

      try {
        const res = await fetch("/api/logout", {
          method: "POST",
          credentials: "include"
        });

        if (!res.ok) {
          throw new Error("Logout failed");
        }

        setAuthStatus("Logged out.", "success");
        resultArea.innerHTML = '<div class="placeholder">Submit a flip and your analysis will appear here.</div>';
        setAnalyzeStatus("", "");
        await loadUser();
      } catch (err) {
        setAuthStatus(`Error: ${err.message}`, "error");
      } finally {
        logoutBtn.disabled = false;
      }
    }

    async function startCheckout() {
      try {
        setAnalyzeStatus("Redirecting to checkout...", "loading");

        const res = await fetch("/api/create-checkout-session", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "include",
          body: JSON.stringify({ plan: "starter" })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Could not start checkout.");
        }

        if (data.url) {
          window.location.href = data.url;
          return;
        }

        throw new Error("Checkout URL missing.");
      } catch (err) {
        setAnalyzeStatus(`Error: ${err.message}`, "error");
      }
    }

    async function openBillingPortal() {
      try {
        setAuthStatus("Opening billing portal...", "loading");

        const res = await fetch("/api/create-portal-session", {
          method: "POST",
          credentials: "include"
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Could not open billing portal.");
        }

        if (data.url) {
          window.location.href = data.url;
          return;
        }

        throw new Error("Billing portal URL missing.");
      } catch (err) {
        setAuthStatus(`Error: ${err.message}`, "error");
      }
    }

    analyzeBtn.addEventListener("click", runAnalysis);
    loginBtn.addEventListener("click", login);
    signupBtn.addEventListener("click", signup);
    logoutBtn.addEventListener("click", logout);
    billingBtn.addEventListener("click", openBillingPortal);

    loadUser();
  </script>
</body>
</html>
