<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipAI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      color: #6b7280;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .loading {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .error {
      background: #fef2f2;
      color: #991b1b;
    }

    .success {
      background: #ecfdf5;
      color: #065f46;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.5;
    }

    .placeholder {
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 850px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>FlipAI</h1>
      <p>Analyze product flips before you buy.</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Flip Details</h2>

        <div class="field">
          <label for="product">Product</label>
          <input
            id="product"
            type="text"
            placeholder="e.g. iPhone 12 64GB Unlocked"
            value="iPhone 12 64GB Unlocked"
          />
        </div>

        <div class="field">
          <label for="condition">Condition</label>
          <textarea
            id="condition"
            placeholder="Describe faults, wear, battery, functionality"
          >Cracked screen, fully working, battery fine, light wear</textarea>
        </div>

        <div class="field">
          <label for="buyPrice">Buy Price (£)</label>
          <input
            id="buyPrice"
            type="number"
            step="0.01"
            placeholder="90"
            value="90"
          />
        </div>

        <div class="field">
          <label for="repairCost">Repair Cost (£)</label>
          <input
            id="repairCost"
            type="number"
            step="0.01"
            placeholder="40"
            value="40"
          />
        </div>

        <div class="field">
          <label for="extras">Extras</label>
          <input
            id="extras"
            type="text"
            placeholder="e.g. Box included, unlocked"
            value="Box included, unlocked"
          />
        </div>

        <div class="field">
          <label for="goal">Goal</label>
          <select id="goal">
            <option selected>Fast sale</option>
            <option>Maximum profit</option>
            <option>Low risk</option>
          </select>
        </div>

        <button id="analyzeBtn">Analyze Flip</button>
        <div id="status"></div>
      </div>

      <div class="card">
        <h2>Result</h2>
        <div id="resultArea" class="placeholder">
          Submit a flip and your analysis will appear here.
        </div>
      </div>
    </div>
  </div>

  <script>
    const analyzeBtn = document.getElementById("analyzeBtn");
    const statusEl = document.getElementById("status");
    const resultArea = document.getElementById("resultArea");

    function getPayload() {
      return {
        product: document.getElementById("product").value.trim(),
        condition: document.getElementById("condition").value.trim(),
        buyPrice: Number(document.getElementById("buyPrice").value || 0),
        repairCost: Number(document.getElementById("repairCost").value || 0),
        extras: document.getElementById("extras").value.trim(),
        goal: document.getElementById("goal").value
      };
    }

    async function runAnalysis() {
      statusEl.innerHTML = '<div class="status loading">Analyzing...</div>';
      resultArea.innerHTML = "";
      analyzeBtn.disabled = true;

      try {
        const payload = getPayload();

        const res = await fetch("/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Request failed");
        }

        statusEl.innerHTML = '<div class="status success">Analysis complete.</div>';
        resultArea.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      } catch (err) {
        statusEl.innerHTML = `<div class="status error">Error: ${err.message}</div>`;
        resultArea.innerHTML = '<div class="placeholder">No result available.</div>';
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    analyzeBtn.addEventListener("click", runAnalysis);
  </script>
</body>
</html>
